<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>睡前音乐 - 随机睡前放送</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app" class="music-page">
    <header class="header">
      <a href="index.html" class="back-link" aria-label="返回首页">←</a>
      <h1>睡前音乐</h1>
      <p class="slogan">开发者推荐</p>
    </header>
    <section class="music-section">
      <ul id="music-list" class="music-list"></ul>
    </section>
    <footer class="footer">
      <p>/p>
    </footer>
  </div>
  <script src="data/recommended-music.js"></script>
  <script>
    (function () {
      const list = window.RECOMMENDED_MUSIC || [];
      const ul = document.getElementById('music-list');
      if (!ul) return;
      ul.innerHTML = list.map(function (item) {
        const desc = item.desc ? '<span class="music-item-desc">' + escapeHtml(item.desc) + '</span>' : '';
        return '<li class="music-item card">' +
          '<a href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener" class="music-item-link">' +
          '<span class="music-item-icon" aria-hidden="true">♪</span>' +
          '<div class="music-item-info">' +
          '<span class="music-item-title">' + escapeHtml(item.title) + '</span>' +
          desc +
          '</div>' +
          '<span class="music-item-arrow">→</span></a></li>';
      }).join('');
      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }
    })();
  </script>
</body>
</html>
